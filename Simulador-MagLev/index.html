<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador MagLev - Eletromagnetismo</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <!-- Painel de Controles (Esquerda) -->
    <div id="ui-container">
        <h2>Controles do Aerogerador</h2>

        <label>Velocidade do Vento (m/s): <span id="val-vento">5</span></label>
        <input type="range" id="vento" min="0" max="20" value="5">

        <label>Tamanho das Pás (Raio): <span id="val-raio">2.5</span></label>
        <input type="range" id="raio-pas" min="1.5" max="4.0" step="0.1" value="2.5">

        <label>Número de Ímãs: <span id="val-imas">6</span></label>
        <input type="range" id="imas" min="2" max="10" step="2" value="6">

        <label>Material Magnético (Ímãs):</label>
        <select id="tipo-ima">
            <option value="1.5">Neodímio (Alta Força)</option>
            <option value="0.8">Ferrite (Baixa Força)</option>
        </select>

        <label style="display: flex; align-items: center; gap: 8px; margin-top: 15px; cursor: pointer;">
            <input type="checkbox" id="mostrar-linhas" checked>
            Mostrar Campo Magnético
        </label>

        <label>Número de Espiras: <span id="val-espiras">300</span></label>
        <input type="range" id="espiras" min="100" max="500" step="50" value="300">

        <label>Carga Conectada (%): <span id="val-carga">0</span></label>
        <input type="range" id="carga" min="0" max="100" step="10" value="0">

        <div class="painel-dados">
            <p>RPM: <span id="out-rpm">0</span></p>
            <p>Tensão Gerada: <span id="out-tensao">0.00</span> V</p>
            <p>Altura de Levitação: <span id="out-altura">0.00</span> cm</p>
            <hr>
            <p><strong>IA (Regressão Linear):</strong></p>
            <p>Previsão de Energia (1h): <span id="out-previsao">0.00</span> Wh</p>
        </div>
    </div>

    <!-- NOVO: Painel do Gráfico (Direita) -->
    <div id="grafico-container"
        style="position: absolute; top: 10px; right: 10px; background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; font-family: Arial, sans-serif;">
        <p style="margin-top: 0; font-weight: bold; font-size: 14px; color: #333;">Tendência (Vento vs Tensão)</p>
        <canvas id="graficoIA" width="250" height="180"></canvas>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js"
            }
        }
    </script>
    <script type="module" src="js/main.js"></script>
</body>

</html>
